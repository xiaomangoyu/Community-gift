# Reference image manifest.
#
# Each entry is a validated (image, prompt) pair. The reference is treated as
# a multi-dimensional anchor — it contributes not just thematic information,
# but also orientation / proportion / scale / aesthetic conventions that apply
# to every host.
#
# RECALL MODEL
# ------------
# ReferenceRouter scores every reference against host signals, takes top-N
# (default 3), and falls back to random sampling from the quality:strong pool
# when all scores are 0. References are passed to Seedream as binary_data; the
# 1:1 relationship with `role_description` is preserved by writing it into
# pre_llm_result.input{1,2,3}.
#
# SCORING WEIGHTS (in ReferenceRouter)
#   shape:        3
#   color:        2
#   vibe / text:  1 each
#   quality:strong bonus: +0.5
#
# DESIGNER ADD-FLOW
#   1. Drop <id>.{png,txt} into this folder.
#   2. Append an entry below with tags + role_description.
#   3. No code change. Re-run wells; ReferenceRouter picks it up automatically.
#
# Fragments (symbol_translation / text_style / bottom_node / mood / palette_hint
# / material_hint) are NOT stored here anymore. Text scaffolding belongs in
# references/shape/rules.yaml. The reference image carries the visual half
# via i2i; role_description tells Seedream what each image contributes.

version: 2

